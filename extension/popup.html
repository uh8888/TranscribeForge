<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TranscribeForge YouTube Sync</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 320px;
      margin: 0;
      padding: 18px;
      background: #1a1a1a;
      color: #f0f0f0;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .subtitle {
      font-size: 12px;
      color: #999;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 11px;
      color: #aaa;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="url"] {
      width: 100%;
      box-sizing: border-box;
      padding: 7px 9px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 5px;
      color: #f0f0f0;
      font-size: 12px;
      margin-bottom: 14px;
    }
    button {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #d62828, #f77f00);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      margin-top: 12px;
      padding: 9px 11px;
      border-radius: 5px;
      font-size: 12px;
      display: none;
    }
    .status.ok    { background: #1e3a1e; color: #8fd98f; display: block; }
    .status.err   { background: #3a1e1e; color: #ff9999; display: block; }
    .status.info  { background: #1e2a3a; color: #9fc5ff; display: block; }
    .footer {
      margin-top: 14px;
      font-size: 10px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>📺 TranscribeForge Sync</h1>
  <div class="subtitle">YouTube-Cookies in 1 Klick übertragen</div>

  <label for="server">Server-URL</label>
  <input type="url" id="server" value="https://transcribeforge.hiltmann.cloud">

  <button id="send">🔄 Cookies senden</button>

  <div id="status" class="status"></div>

  <div class="footer">Stelle sicher, dass du bei YouTube eingeloggt bist.</div>

  <script src="popup.js"></script>
</body>
</html>
